services:
  app:
    build: 
      context: .
    depends_on:
      - db
    ports:
      - "3000:3000"
    restart: always
    networks:
      - nodejs-shopping
    environment:
      MONGO_DB: shop
  
  db:
    image: mongo:7
    networks:
      - nodejs-shopping
    ports:
      - "27017:27017"
    
networks:
  nodejs-shopping:
    driver: bridge
